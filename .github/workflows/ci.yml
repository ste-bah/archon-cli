name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config perl make
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets

  build-and-test:
    name: build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config perl make

      - name: Install lld linker (low-memory linker for large workspaces)
        if: runner.os == 'Linux'
        # lld typically uses 30-50% less memory than GNU ld during link of
        # large workspaces; mitigates ubuntu-latest 7GB SIGBUS during link of
        # smoke_resolve_overflow (third remediation attempt — see #226).
        run: |
          sudo apt-get install -y lld
          echo "RUSTFLAGS=-C link-arg=-fuse-ld=lld" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-${{ matrix.os }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Build workspace
        run: cargo build --workspace --verbose

      - name: Run tests (nextest)
        shell: bash
        env:
          CARGO_BUILD_JOBS: "1"
        # nextest runs each test binary in its own process and serialises
        # build+link via CARGO_BUILD_JOBS=1, which keeps peak link memory
        # within ubuntu-latest's 7GB RAM ceiling and unblocks #225 SIGBUS
        # on the smoke_resolve_overflow link.
        run: cargo nextest run --workspace --no-fail-fast --test-threads=1

      - name: Run doctests
        shell: bash
        env:
          CARGO_BUILD_JOBS: "1"
        # nextest does not execute doctests; preserve coverage here.
        run: cargo test --workspace --doc -- --test-threads=1

  arch-lint:
    name: arch-lint (D10 spawn-everything)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run architecture lint scaffold
        run: bash scripts/lint/arch-lint.sh
      - name: check-file-sizes (NFR-FOR-D4-MAINTAINABILITY)
        run: bash scripts/check-file-sizes.sh

  preserve-invariants:
    name: preserve-invariants (TASK-AGS-OBS-918)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: check-preserve-invariants (fraud detection)
        run: bash scripts/check-preserve-invariants.sh
      - name: preserve-invariants self-test (fraud-detection-of-the-fraud-detector)
        run: bash scripts/tests/preserve-invariants-self-test.sh

  tui-file-size-lint:
    name: tui-file-size-lint (NFR-TUI-QUAL-001)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: check-tui-file-sizes
        run: bash scripts/check-tui-file-sizes.sh

  tui-cycle-check:
    name: tui-cycle-check (NFR-TUI-MOD-002)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: check-tui-module-cycles
        run: bash scripts/check-tui-module-cycles.sh

  tui-duplication-check:
    name: tui-duplication-check (NFR-TUI-MOD-003)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: check-tui-duplication
        run: bash scripts/check-tui-duplication.sh

  tui-complexity:
    name: tui-complexity (NFR-TUI-QUAL-003)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: check-tui-complexity
        run: bash scripts/check-tui-complexity.sh

  tui-coverage:
    name: tui-coverage (NFR-TUI-QUAL-002)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: check-tui-coverage
        run: TUI_COVERAGE_MIN=10 bash scripts/check-tui-coverage.sh

  build-release-smoke:
    name: release build smoke
    runs-on: ubuntu-latest
    needs: [build-and-test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config perl make
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-smoke
      - run: cargo build --release --bin archon
      - name: Smoke test binary
        run: ./target/release/archon --version || ./target/release/archon --help || true
