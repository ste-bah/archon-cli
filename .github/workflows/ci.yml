name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config perl make
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets

  build-and-test:
    name: build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config perl make

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-${{ matrix.os }}

      - name: Build workspace
        run: cargo build --workspace --verbose

      - name: Run tests
        shell: bash
        env:
          CARGO_BUILD_JOBS: "1"
        run: cargo test --workspace --verbose -- --test-threads=1

  arch-lint:
    name: arch-lint (D10 spawn-everything)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run architecture lint scaffold
        run: bash scripts/lint/arch-lint.sh
      - name: check-file-sizes (NFR-FOR-D4-MAINTAINABILITY)
        run: bash scripts/check-file-sizes.sh

  tui-file-size-lint:
    name: tui-file-size-lint (NFR-TUI-QUAL-001)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: check-tui-file-sizes
        run: bash scripts/check-tui-file-sizes.sh

  tui-cycle-check:
    name: tui-cycle-check (NFR-TUI-MOD-002)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: check-tui-module-cycles
        run: bash scripts/check-tui-module-cycles.sh

  tui-duplication-check:
    name: tui-duplication-check (NFR-TUI-MOD-003)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: check-tui-duplication
        run: bash scripts/check-tui-duplication.sh

  build-release-smoke:
    name: release build smoke
    runs-on: ubuntu-latest
    needs: [build-and-test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config perl make
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-smoke
      - run: cargo build --release --bin archon
      - name: Smoke test binary
        run: ./target/release/archon --version || ./target/release/archon --help || true
