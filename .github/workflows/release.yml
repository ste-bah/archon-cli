name: Release

on:
  # Auto-trigger after CI succeeds on main
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  # Manual trigger as fallback
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: write

jobs:
  # ── Gate: only proceed if CI passed + version is unreleased ──
  check:
    name: check version
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      should_release: ${{ steps.check_tag.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from Cargo.toml
        id: version
        shell: bash
        run: |
          VERSION=$(sed -n '/\[workspace\.package\]/,/^\[/{s/^version *= *"\(.*\)"/\1/p;}' Cargo.toml)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected version: ${VERSION} (tag: v${VERSION})"

      - name: Check if tag already released
        id: check_tag
        shell: bash
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag v${{ steps.version.outputs.version }} already exists — skipping."
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag v${{ steps.version.outputs.version }} is new — building release."
          fi

  # ── Build release binaries for all platforms ─────────────────
  build:
    name: build ${{ matrix.target }}
    needs: [check]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux build deps
        if: runner.os == 'Linux' && !matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Install cross-compilation deps (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu pkg-config libssl-dev
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --bin archon --target ${{ matrix.target }}

      - name: Strip binary (unix)
        if: runner.os != 'Windows' && !matrix.cross
        run: strip target/${{ matrix.target }}/release/archon

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          TAG="${{ needs.check.outputs.tag }}"
          NAME="archon-${TAG}-${{ matrix.target }}"
          mkdir -p "dist/${NAME}"
          cp target/${{ matrix.target }}/release/archon "dist/${NAME}/"
          cp README.md LICENSE "dist/${NAME}/"
          cd dist
          tar -czf "${NAME}.tar.gz" "${NAME}"
          sha256sum "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $TAG = "${{ needs.check.outputs.tag }}"
          $NAME = "archon-$TAG-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "dist/$NAME" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/archon.exe" "dist/$NAME/"
          Copy-Item README.md "dist/$NAME/"
          Copy-Item LICENSE "dist/$NAME/"
          Compress-Archive -Path "dist/$NAME" -DestinationPath "dist/$NAME.zip"
          (Get-FileHash "dist/$NAME.zip" -Algorithm SHA256).Hash | Out-File "dist/$NAME.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: archon-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.zip
            dist/*.zip.sha256
          if-no-files-found: error
          retention-days: 7

  # ── Create draft release: you review + click Publish ─────────
  draft-release:
    name: draft release ${{ needs.check.outputs.tag }}
    needs: [check, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create git tag
        run: |
          git tag "${{ needs.check.outputs.tag }}"
          git push origin "${{ needs.check.outputs.tag }}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check.outputs.tag }}
          name: Archon ${{ needs.check.outputs.tag }}
          draft: true
          prerelease: false
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.zip
            dist/*.zip.sha256
          body: |
            ## Archon CLI ${{ needs.check.outputs.tag }}

            ### Packages
            | Platform | Architecture | File |
            |----------|-------------|------|
            | Linux | x86_64 | `archon-${{ needs.check.outputs.tag }}-x86_64-unknown-linux-gnu.tar.gz` |
            | Linux | aarch64 | `archon-${{ needs.check.outputs.tag }}-aarch64-unknown-linux-gnu.tar.gz` |
            | macOS | x86_64 | `archon-${{ needs.check.outputs.tag }}-x86_64-apple-darwin.tar.gz` |
            | macOS | aarch64 (Apple Silicon) | `archon-${{ needs.check.outputs.tag }}-aarch64-apple-darwin.tar.gz` |
            | Windows | x86_64 | `archon-${{ needs.check.outputs.tag }}-x86_64-pc-windows-msvc.zip` |

            SHA256 checksums included alongside each archive.

            ---
            *This is a draft release. Review the artifacts and click **Publish** when ready.*
