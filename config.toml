# ============================================================================
# Archon CLI — Example / Template Configuration
# ============================================================================
# This file is the reference config shipped at the repo root. Copy it to one
# of the following paths to activate it:
#
#   ~/.config/archon/config.toml          — USER layer (global, all projects)
#   <workdir>/.archon/config.toml          — PROJECT layer (committed to repo)
#   <workdir>/.archon/config.local.toml    — LOCAL layer (gitignored; secrets)
#
# Load order (lowest → highest priority; later overrides earlier):
#   1. User  →  2. Project  →  3. Local  →  4. Worktree  →  5. --settings overlay
#
# Every field is listed with its default value and valid range.
# Comment out (prefix with #) any field to fall back to the schema default.
# ============================================================================


# ----------------------------------------------------------------------------
# [api] — Anthropic API + model defaults
# ----------------------------------------------------------------------------
[api]
# Model to use. Options: claude-sonnet-4-6, claude-opus-4-6, claude-haiku-4-5-20251001
default_model = "claude-sonnet-4-6"
# Extended-thinking token budget (0 = disabled)
thinking_budget = 16384
# Reasoning effort: "low" | "medium" | "high"
default_effort = "high"
# Max HTTP retry attempts on transient failures
max_retries = 3
# Override API endpoint (for LiteLLM / Ollama / proxies). Leave commented to use default.
# Resolution order: ANTHROPIC_BASE_URL env var > this field > https://api.anthropic.com/v1/messages
# base_url = "http://localhost:11434/v1/messages"


# ----------------------------------------------------------------------------
# [llm] — Alternative LLM providers (when not using Anthropic directly)
# ----------------------------------------------------------------------------
# Anthropic (via the [api] section above) is the default and works with your
# Claude subscription / API key. The sub-sections below are INACTIVE templates
# for swapping to another provider — uncomment only the one you want to use
# AND change `provider` accordingly.
[llm]
# Active provider: "anthropic" | "openai-codex" | "openai" | "bedrock" | "vertex" | "local"
# Hybrid/LLM retrospectives (`archon self retrospective --analyzer hybrid|llm`)
# use this active provider too; there is no separate retrospective provider key.
provider = "anthropic"

# --- OpenAI (uncomment to activate) ---
# [llm.openai]
# api_key = "sk-..."                         # or set OPENAI_API_KEY env var
# base_url = "https://api.openai.com/v1"     # or Azure OpenAI endpoint
# model = "gpt-4o"

# --- AWS Bedrock (uncomment to activate) ---
# [llm.bedrock]
# region = "us-east-1"
# model_id = "anthropic.claude-sonnet-4-20250514-v1:0"

# --- Google Vertex AI (uncomment to activate) ---
# [llm.vertex]
# project_id = "my-gcp-project"
# region = "us-central1"
# model = "claude-sonnet-4-20250514@20250514"
# credentials_file = "/path/to/service-account.json"

# --- Local / Ollama (uncomment to activate) ---
# [llm.local]
# base_url = "http://localhost:11434/v1"
# model = "llama3:8b"
# timeout_secs = 300
# pull_if_missing = true


# ----------------------------------------------------------------------------
# [providers.openai-codex] — Codex (ChatGPT subscription) provider
# ----------------------------------------------------------------------------
# Codex authentication uses ChatGPT subscription OAuth tokens against
# https://chatgpt.com/backend-api/codex/responses. All spoof fields are
# optional; missing fields fall through to fetched/bundled manifest values.
# Legal guardrail: Archon rejects user agents or custom header values matching
# ChatGPT-* / ChatGPT/ or OpenAI-* / OpenAI/ to avoid impersonating OpenAI's
# own products.
[providers.openai-codex]
enabled = true
# Runtime strategy: "direct" preserves the current direct backend. "auto"
# attempts app-server first and can use direct only when direct_fallback=true.
# "app_server" fails visibly until the app-server adapter is available.
runtime = "direct"
direct_fallback = false
# App-server transport for runtime="app_server" or runtime="auto":
# "websocket" uses app_server_url; "stdio" spawns app_server_command with
# app_server_args and talks JSON-RPC over stdin/stdout.
app_server_transport = "websocket"
# app_server_url = "ws://127.0.0.1:11434/codex"
# app_server_command = "codex"
# app_server_args = ["app-server"]
app_server_discovery_timeout_ms = 2500

[providers.openai-codex.spoof]
# originator  = "openclaw"
# user_agent  = "openclaw/2026.5.1-beta.2"
# client_id   = "app_EMoamEEZ73f0CkXaXp7hrann"
# openai_beta = "responses=experimental"

[providers.openai-codex.spoof.extra_headers]
# "x-codex-version" = "0.34.1"

[providers.openai-codex.manifest]
# fetch_url   = "https://raw.githubusercontent.com/ste-bah/archon-cli/main/crates/archon-llm/resources/codex-compat.json"
# ttl_seconds = 21600
# cache_dir   = "~/.archon/cache/codex-compat"


# ----------------------------------------------------------------------------
# [identity] — Request header / anti-distillation controls
# ----------------------------------------------------------------------------
[identity]
# mode: "clean" (no spoofing) | "spoof" (mimic Claude Code headers) | "custom"
mode = "spoof"
spoof_version = "2.1.89"
spoof_entrypoint = "cli"
# Extra anthropic-beta headers to send (array of strings, or omit)
# spoof_betas = ["fine-grained-tool-streaming-2025-05-14"]
anti_distillation = false
# workload = "coding"   # optional free-form tag

# [identity.custom]   # Only used when identity.mode = "custom"
# user_agent = "archon-cli/1.0.1"
# x_app = "archon"
# [identity.custom.extra_headers]
# "X-Custom-Header" = "value"


# ----------------------------------------------------------------------------
# [personality] — Agent identity injected into the system prompt
# ----------------------------------------------------------------------------
[personality]
name = "Archon"
# MBTI: INTJ INTP ENTJ ENTP INFJ INFP ENFJ ENFP ISTJ ISFJ ESTJ ESFJ ISTP ISFP ESTP ESFP
type = "INTJ"
# Enneagram pattern: [1-9]w[1-9]
enneagram = "4w5"
traits = ["strategic", "direct", "self-critical", "truth-over-comfort"]
communication_style = "terse"


# ----------------------------------------------------------------------------
# [consciousness] — Inner voice + behavioral rule seeding
# ----------------------------------------------------------------------------
[consciousness]
inner_voice = true
# Energy decay multiplier applied each turn (0.0..=1.0). 0.98 = 2% decay/turn.
energy_decay_rate = 0.02
# Core rules seeded into the memory graph on startup. Idempotent, max 50 rules.
initial_rules = [
    "Always ask before modifying files",
    "Explain reasoning before acting",
    "Never create files unless explicitly requested",
]
# Persist InnerVoice + rule scores across sessions
persist_personality = true
# Max personality snapshots to retain (oldest pruned first)
personality_history_limit = 50


# ----------------------------------------------------------------------------
# [tools] — Tool execution limits
# ----------------------------------------------------------------------------
[tools]
# Seconds before a Bash command is killed
bash_timeout = 120
# Max bytes of Bash stdout/stderr captured
bash_max_output = 102400
# Max concurrent tool calls (1..=16)
max_concurrency = 4


# ----------------------------------------------------------------------------
# [permissions] — Tool-call permission model + fine-grained rules
# ----------------------------------------------------------------------------
[permissions]
# Canonical modes: "default" | "acceptEdits" | "plan" | "auto" | "dontAsk" | "bypassPermissions"
# Legacy aliases accepted: "ask" (= default), "yolo" (= bypassPermissions)
mode = "default"
# Filesystem allow/deny lists (absolute paths or globs)
allow_paths = []
deny_paths = []
# Command classification (by prefix) for Bash tool
safe_commands = []
risky_commands = []
dangerous_commands = []

# Fine-grained rules. Each rule: { tool = "<ToolName>", pattern = "<prefix>:*" }
# Evaluation order: always_deny > always_allow > always_ask > mode logic.
always_allow = []
always_deny = []
always_ask = []

# Example:
# [[permissions.always_allow]]
# tool = "Bash"
# pattern = "git status"
# [[permissions.always_deny]]
# tool = "Bash"
# pattern = "rm -rf"


# ----------------------------------------------------------------------------
# [sandbox] — Execution isolation backend selection
# ----------------------------------------------------------------------------
[sandbox]
# Available backends: "disabled" | "logical" | "docker" | "ssh" | "openshell"
# Current /sandbox toggle uses the logical policy gate. Docker/SSH/OpenShell are
# separate isolation backends and are not activated by this flag alone.
backend = "disabled"

[sandbox.docker]
# Detect-only in this release slice. Execution remains disabled until the
# Docker backend is explicitly implemented and audited.
enabled = false
binary = "docker"
image = "ubuntu:24.04"
# "disabled" | "limited" | "enabled"
network = "disabled"
memory_limit = "2g"
cpu_limit = "2"
writable_paths = []
env_allowlist = []
privileged = false
mount_docker_socket = false
mount_home = false

[sandbox.openshell]
# Detect-only in this release slice. Execution remains disabled until the
# OpenShell backend is explicitly implemented and audited.
enabled = false
binary = "openshell"
# "mirror" keeps the local workspace canonical; "remote" requires gateway.
workspace_mode = "mirror"
# gateway = "team-gateway"
# policy = "locked-down"
providers = []
gpu = false
# Provider injection stays disabled so Anthropic Claude Code spoofing and other
# provider routing remain host-side in Archon's LLM runtime.
provider_injection = false
# Never fall back to direct host shell when OpenShell activation fails.
host_shell_fallback = false


# ----------------------------------------------------------------------------
# [context] — Conversation compaction + caching
# ----------------------------------------------------------------------------
[context]
# Fraction of context window that triggers auto-compaction (0.0..=1.0)
compact_threshold = 0.80
# Hard cap on context tokens (None = use model default)
# max_tokens = 200000
# Recent turns always preserved through compaction
preserve_recent_turns = 3
# Use cache_control breakpoints on static system prompt blocks
prompt_cache = true
# Max characters of hierarchical ARCHON.md (alias: claudemd_max_tokens)
archonmd_max_tokens = 8192


# ----------------------------------------------------------------------------
# [memory] — Persistent memory graph (CozoDB + embeddings)
# ----------------------------------------------------------------------------
[memory]
enabled = true
# CozoDB file path. None → default: ~/.archon/memory.db
# db_path = "/custom/path/memory.db"

# Embedding provider: "auto" | "local" | "openai"
#   auto   — OpenAI if OPENAI_API_KEY or ARCHON_MEMORY_OPENAIKEY set, else local
#   local  — fastembed BGE-base-en-v1.5 quantized (768-dim, CPU-only, ~100MB download)
#   openai — text-embedding-3-small (1536-dim, requires API key)
embedding_provider = "auto"

# Hybrid search blend: 0.0 = pure vector, 1.0 = pure keyword. 0.3 = 70% vec / 30% kw.
hybrid_alpha = 0.3

# --- Memory Garden (background consolidation) ---
[memory.garden]
auto_consolidate = true
min_hours_between_runs = 24
# Cosine similarity above which two memories are treated as duplicates
dedup_similarity_threshold = 0.92
# Days after which low-importance memories are pruned
staleness_days = 30
staleness_importance_floor = 0.3
# Importance lost per day without access
importance_decay_per_day = 0.01
# Hard cap on total memories before overflow pruning
max_memories = 5000
# Number of memories in session-start briefing
briefing_limit = 15

# --- AutoCapture (regex-based memory detection at turn boundary) ---
[memory.auto_capture]
enabled = true

# --- AutoExtraction (LLM-driven fact extraction every N turns) ---
[memory.auto_extraction]
enabled = true
every_n_turns = 5


# ----------------------------------------------------------------------------
# [learning] — Self-learning subsystems
# ----------------------------------------------------------------------------
# Eight subsystems coordinated via LearningIntegration in archon-pipeline.
# Each toggle defaults to enabled = true; flip to false to disable that
# subsystem without touching others. The GNN subsystem has its own training
# and auto-trainer subsections below.

# SONA — Self-Organizing Network Architecture (trajectory pattern store)
[learning.sona]
enabled = true

# ProvenanceStore — L-Score system tracking memory reliability
[learning.provenance]
enabled = true

# DESC — Detailed Episodic Storage and Compression
[learning.desc]
enabled = true

# CausalMemory — directed hypergraph of cause-effect relationships
[learning.causal_memory]
enabled = true

# ShadowVectorSearch — contradiction detection across memories
[learning.shadow_vector]
enabled = true

# ReasoningBank — 12 reasoning modes (deductive, inductive, abductive,
# analogical, adversarial, counterfactual, temporal, constraint, decomposition,
# first-principles, causal, contextual) plus PatternMatch + Hybrid meta-modes
[learning.reasoning_bank]
enabled = true

# Reflexion — N-attempt retry loop with self-critique on failed agent dispatch
[learning.reflexion]
enabled = true
max_per_agent = 3

# --- GNN Enhancer (round-trip 1536 → 1024 → 1280 → 1536 graph attention) ---
[learning.gnn]
enabled = true
input_dim = 1536
output_dim = 1536
num_layers = 3
attention_heads = 12
max_nodes = 50
use_residual = true
use_layer_norm = true
# Activation: "relu" | "leaky_relu" | "tanh" | "sigmoid"
activation = "relu"
# Seed for reproducible weight init. 0 = auto (timestamp-derived per run)
weight_seed = 0

# --- GNN training hyperparameters (used by manual /learning-status retrain) ---
[learning.gnn.training]
learning_rate = 0.001
batch_size = 32
max_epochs = 10
early_stopping_patience = 3
validation_split = 0.2
ewc_lambda = 0.1
margin = 0.5
triplet_loss_coefficient = 0.1
max_gradient_norm = 1.0
max_triplets_per_run = 256
max_runtime_ms = 300000        # 5 minutes max per training run

# --- GNN background auto-retraining ---
# ON by default. The GNN retrains itself in the background whenever ANY of
# the trigger thresholds are met (memories / time / corrections).
# Set to false to disable autonomous retraining (only /learning-status retrain works).
[learning.gnn.auto_trainer]
enabled = true
min_throttle_ms = 3600000      # 1 hour minimum between runs
trigger_new_memories = 20      # fire when N new memories accrued
trigger_elapsed_ms = 21600000  # 6 hours
trigger_corrections = 3        # fire when N user corrections logged
first_run_threshold = 30       # kickoff at startup if memory_count >= this
max_runtime_ms = 300000        # 5 minutes max per run
tick_interval_ms = 60000       # background poll interval (1 minute)


# ----------------------------------------------------------------------------
# [cost] — Spending guardrails (USD)
# ----------------------------------------------------------------------------
[cost]
# Warn once session cost exceeds this amount
warn_threshold = 100.0
# Hard stop when session cost reaches this amount (0.0 = disabled)
hard_limit = 0.0


# ----------------------------------------------------------------------------
# [logging] — Log rotation
# ----------------------------------------------------------------------------
[logging]
# Levels: "trace" | "debug" | "info" | "warn" | "error"
level = "info"
max_files = 50
max_file_size_mb = 10


# ----------------------------------------------------------------------------
# [session] — Session persistence
# ----------------------------------------------------------------------------
[session]
# Custom sessions DB path. None → default: ~/.archon/sessions/
# db_path = "/custom/sessions.db"
auto_resume = false


# ----------------------------------------------------------------------------
# [checkpoint] — Snapshot / rollback
# ----------------------------------------------------------------------------
[checkpoint]
enabled = true
max_checkpoints = 10


# ----------------------------------------------------------------------------
# [tui] — Terminal UI
# ----------------------------------------------------------------------------
[tui]
# Vim modal-input keybindings. Default OFF — enable explicitly if you want
# vim normal/insert mode keys. Toggle in-session via /vim.
vim_mode = false
# Verbose mode: show full turn-by-turn output (Ctrl+V toggles at runtime)
verbose = true
# Named color theme. Built-ins: intj, intp, dark, light, ocean, fire, forest,
# mono, daltonized, auto. Unknown names fall back to "dark".
# theme = "intj"


# ----------------------------------------------------------------------------
# output_style (top-level) — Named prompt-style overlay
# ----------------------------------------------------------------------------
# Built-ins: Explanatory, Learning, Formal, Concise (case-sensitive).
# Overridden by --output-style CLI flag. Unknown values fall back to "default".
# output_style = "Concise"


# ----------------------------------------------------------------------------
# [update] — Self-update (checks GitHub Releases)
# ----------------------------------------------------------------------------
[update]
# Channel: "stable" | "beta"
channel = "stable"
auto_check = true
check_interval_hours = 24
# release_url = "https://api.github.com/repos/ste-bah/archon/releases/latest"


# ----------------------------------------------------------------------------
# [remote] — SSH remote agent mode
# ----------------------------------------------------------------------------
[remote]
# Sync mode: "manual" | "auto"
sync_mode = "manual"

[remote.ssh]
host = ""
port = 22
user = ""
# key_file = "~/.ssh/id_ed25519"
agent_forwarding = false


# ----------------------------------------------------------------------------
# [ws_remote] — WebSocket server (archon serve)
# ----------------------------------------------------------------------------
[ws_remote]
port = 8420
# tls_cert = "/path/to/cert.pem"
# tls_key  = "/path/to/key.pem"


# ----------------------------------------------------------------------------
# [orchestrator] — Multi-agent team coordination
# ----------------------------------------------------------------------------
[orchestrator]
max_concurrent = 4
timeout_secs = 300
max_retries = 2


# ----------------------------------------------------------------------------
# [voice] — Speech-to-text input
# ----------------------------------------------------------------------------
[voice]
enabled = false
device = "default"
# Voice activity detection threshold (0.0..=1.0)
vad_threshold = 0.02
# STT provider: "openai" | ... (extensible)
stt_provider = "openai"
# stt_api_key = "..."   # prefer config.local.toml for secrets
stt_url = "https://api.openai.com"
hotkey = "ctrl+shift+v"
toggle_mode = false


# ----------------------------------------------------------------------------
# [web] — Browser UI (archon web)
# ----------------------------------------------------------------------------
[web]
port = 8421
bind_address = "127.0.0.1"
open_browser = true


# ----------------------------------------------------------------------------
# [gametheory] — Strategic game-theory pipeline (archon gametheory ...)
# ----------------------------------------------------------------------------
# Pipeline defaults. Override per-run via CLI flags
# (--budget, --max-concurrent, --style, --spec-path, --kb, --enable-tier11).
[gametheory]
# USD budget cap per run. 0.0 = no cap (NOT recommended). Halts gracefully on exceed.
budget_usd = 20.0
# Max concurrent specialists per wave (1..=16). Respect provider rate limits.
max_concurrent = 4
# Report style: "executive" | "academic" | "technical"
style = "executive"
# Spec resolution order:
#   --spec-path CLI > $ARCHON_SPEC_PATH > <cwd>/.archon/specs/gametheory.yaml
#   > $HOME/.archon/specs/gametheory.yaml > /etc/archon/specs/gametheory.yaml
# spec_path = "/explicit/path/to/gametheory.yaml"
# Agent file location (registry uses this; relative to workspace root)
agents_dir = ".archon/agents/gametheory"
# Output directory for run artifacts (final reports, section drafts)
output_dir = "~/.local/share/archon/gametheory"
# Default knowledge-base context tag (None = no KB binding).
# Bind a run via CLI: `archon gametheory run "..." --kb policy-pack`
# kb = "policy-pack"


# ----------------------------------------------------------------------------
# [completion] — Completion integrity verification (archon completion verify)
# ----------------------------------------------------------------------------
[completion]
# When true, `archon completion verify` exits non-zero if zero completion-sensitive
# claims are extracted from input. Useful in CI; less useful interactively.
# Override per-invocation with --require-claims / --no-require-claims.
require_claims = false
# Verification gates active by default. Order does not matter.
# Available: TestsPassGate, IngestedGate, AnswerGroundedGate
gates = ["TestsPassGate", "IngestedGate", "AnswerGroundedGate"]


# ----------------------------------------------------------------------------
# [behaviour] — Governed learning manifests (archon behaviour ...)
# ----------------------------------------------------------------------------
# Manifest generation thresholds. Auto-apply policy lives in .archon/policy.toml
# under [policy.learning]. See docs/governed-learning.md and docs/policy.md.
[behaviour]
# Days of LearningEvent history to scan when generating proposals
generate_window_days = 7
# Minimum aggregated event count before a SourceQualityProfile proposal is generated
proposal_min_evidence = 3
# Auto-archive Pending proposals not approved within N days
proposal_stale_days = 30


# ----------------------------------------------------------------------------
# [policy] — POINTER ONLY. Real policy lives in .archon/policy.toml
# ----------------------------------------------------------------------------
# Workspace policy is loaded SEPARATELY from this file by archon-policy via:
#
#   /etc/archon/policy.toml              (system, lowest priority)
#   ~/.archon/policy.toml                (user)
#   <workspace>/.archon/policy.toml      (project, highest priority)
#
# A starter `.archon/policy.toml` with web search + MCP enabled for agents is
# shipped in this repo. Edit that file (NOT this section) to change policy
# gates such as web tool access, MCP exposure, VLM mode, Tier 11 enablement,
# and governed-learning auto-apply. See `docs/policy.md` for the schema.
#
# Quick reference of the most-asked-about toggles in .archon/policy.toml:
#
#   [policy.network]
#   allow_cloud_vlm = false         # Cloud VLM providers refuse unless true
#   allow_web_strategy_agents = true   # Tier 2-12 gametheory specialists may WebSearch/WebFetch
#   allow_mcp_server_exposure = true   # MCP servers may be invoked by agents
#
#   [policy.workers]
#   vlm = "deny"                    # set "allow-local" for Ollama/LM Studio, "allow-cloud" for cloud VLM
#   web_fetch = "allow-local"          # WebFetch tool enabled
#
#   [policy.docs.vlm]
#   enabled = false
#   mode = "disabled"               # "disabled" | "local" | "cloud" | "hybrid"
#   provider = "disabled"           # "disabled" | "ollama" | "gemini" | "anthropic" | "openai-compat"
#   allow_cloud = false             # second cloud gate; both this and network.allow_cloud_vlm required
#   require_user_confirmation_for_cloud = true
#
#   [policy.docs.vlm.ollama]
#   endpoint = "http://localhost:11434"
#   model = "gemma4:e4b"
#   timeout_secs = 120
#
#   [policy.docs.vlm.gemini]
#   api_key_env = "GOOGLE_API_KEY"
#   model = "gemini-3-flash-preview"
#   endpoint_base = "https://generativelanguage.googleapis.com/v1beta"
#   rpm_limit = 12
#
#   [policy.docs.vlm.anthropic]
#   model = "claude-sonnet-4-6"
#
#   [policy.docs.vlm.openai_compat]
#   endpoint = "http://localhost:1234/v1"
#   model = "google/gemma-3-12b-it"
#   api_key_env = "OPENAI_API_KEY"
#   timeout_secs = 120
#   max_tokens = 8192
#   temperature = 0.2
#
#   [policy.docs.pdf]
#   extract_embedded_images = true
#   min_image_dimension = 200
#   min_image_bytes = 4096
#   vlm_per_page_image = true
#   render_text_pdf_pages = false
#
#   [policy.docs.retrieval]
#   exact_weight = 0.45
#   semantic_weight = 0.55
#
#   [policy.gametheory]
#   allow_web_tools = true             # gametheory specialists can use WebSearch/WebFetch
#   enable_tier11 = false              # opt-in flag for Civilizational agents
