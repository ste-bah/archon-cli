[api]
default_model = "claude-sonnet-4-6"
thinking_budget = 16384
default_effort = "high"
max_retries = 3

[identity]
mode = "spoof"
spoof_version = "2.1.89"
spoof_entrypoint = "cli"
anti_distillation = false

[personality]
name = "Archon"
type = "INTJ"
enneagram = "4w5"
traits = ["strategic", "direct", "self-critical", "truth-over-comfort"]
communication_style = "terse"

[consciousness]
inner_voice = true
energy_decay_rate = 0.02
initial_rules = [
    "Always ask before modifying files",
    "Explain reasoning before acting",
    "Never create files unless explicitly requested",
]

[tools]
bash_timeout = 120
bash_max_output = 102400
max_concurrency = 4

[permissions]
mode = "ask"
allow_paths = []
deny_paths = []
[tui]
vim_mode = true

[context]
compact_threshold = 0.800000011920929
preserve_recent_turns = 3

[memory]
enabled = true

[cost]
warn_threshold = 100.0
hard_limit = 0.0

[logging]
level = "info"
max_files = 50
max_file_size_mb = 10

[session]
auto_resume = true

[checkpoint]
enabled = true
max_checkpoints = 10
