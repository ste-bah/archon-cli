# ============================================================================
# Archon Policy — workspace defaults
# ============================================================================
# Loaded by archon-policy. See docs/policy.md for the full schema.
#
# Load order (later overrides earlier):
#   1. /etc/archon/policy.toml           — system (lowest)
#   2. ~/.archon/policy.toml             — user
#   3. <workspace>/.archon/policy.toml   — project (this file, highest)
#
# Defaults below give new users a working setup with web search + MCP
# enabled for agents (the common ask). Tighten by setting values to "deny"
# or false. Sensitive surfaces (cloud VLM, Tier 11 civilizational agents,
# governed-learning auto-apply) remain off by default.
# ============================================================================


# ----------------------------------------------------------------------------
# [policy.network] — Outbound network + agent web tool access
# ----------------------------------------------------------------------------
[policy.network]
# Default stance for outbound network: "allow" | "deny"
default = "allow"
# Cloud VLM (image description over the network) — off until you opt in
allow_cloud_vlm = false
# Game-theory Tier 2-12 specialists may invoke WebSearch / WebFetch
allow_web_strategy_agents = true
# MCP servers may be invoked by agents and subagents
allow_mcp_server_exposure = true


# ----------------------------------------------------------------------------
# [policy.workers] — Per-worker enablement
# ----------------------------------------------------------------------------
# Modes per worker: "allow-local" | "allow-cloud" | "deny"
[policy.workers]
ocr = "allow-local"           # local OCR via pdftotext / tesseract
embedding = "allow-local"     # fastembed (local) or OpenAI (cloud)
vlm = "deny"                  # set allow-local for Ollama or allow-cloud for Gemini/Anthropic
web_fetch = "allow-local"     # WebFetch tool enabled


# ----------------------------------------------------------------------------
# [policy.gametheory] — Strategic game-theory pipeline gates
# ----------------------------------------------------------------------------
[policy.gametheory]
# Concurrency cap per analysis council
max_agents_per_council = 12
# Hard USD cap per `archon gametheory run`. Halts gracefully on exceed.
max_cost_usd = 20.00
# Civilizational / Jiang-frameworks agents (Tier 11) — opt-in only.
# Politically sensitive domain; outputs are advisory not authoritative.
enable_tier11 = false
# Tier 2-12 specialists may use WebSearch / WebFetch in their analyses
allow_web_tools = true


# ----------------------------------------------------------------------------
# [policy.learning] — Governed learning approval gates
# ----------------------------------------------------------------------------
# Defaults are CONSERVATIVE. All proposals require approval until you flip
# auto_apply_low_risk to true. The four require_approval_for_* fields stay
# true — they cover changes that can break agents in subtle ways.
[policy.learning]
auto_apply_low_risk = false
require_approval_for_prompt_changes = true
require_approval_for_blocking_gates = true
require_approval_for_network_changes = true


# ----------------------------------------------------------------------------
# [policy.world_model] — Local world-model gates
# ----------------------------------------------------------------------------
# The world model is advisory by default. Cloud embeddings and LLM-assisted
# labeling are explicit opt-ins; behavior-changing use stays disabled unless
# an operator turns it on after reviewing evaluation reports.
[policy.world_model]
allow_third_party_embeddings = false
allow_llm_labeler = false
allow_behavior_changes = false


# ----------------------------------------------------------------------------
# [policy.web] — Browser workbench action gates
# ----------------------------------------------------------------------------
# The web workbench is inspection-first. Mutating browser actions require the
# global gate plus the action-family gate below, and model-changing actions also
# require the matching subsystem policy (for example world_model.allow_behavior_changes).
[policy.web]
allow_mutating_actions = false
allow_file_uploads = false
allow_pipeline_controls = false
allow_model_training_actions = false
allow_corpus_open_paths = false


# ----------------------------------------------------------------------------
# [policy.reasoning_quality] — Visible claim/evidence learning gates
# ----------------------------------------------------------------------------
# Deterministic reasoning-quality extraction is local and enabled by config.
# LLM critic calls, raw text storage, and cloud data flow stay explicit opt-ins.
[policy.reasoning_quality]
allow_llm_critic = false
allow_critic_cloud_data_flow = false
allow_third_party_critic = false
allow_raw_text_storage = false
allow_behavior_proposal_generation = true
allow_session_start_injection = true
allow_trust_updates_during_shadow = false
auto_migrate_reasoning_quality = false


# ----------------------------------------------------------------------------
# [policy.docs.vlm] — Document VLM (image description) gates
# ----------------------------------------------------------------------------
# Off by default. Flip enabled + mode to "local" once you have a local VLM,
# or to "cloud" + allow_cloud = true if you've reviewed the privacy
# implications of sending image bytes to a third-party API.
[policy.docs.vlm]
enabled = false
mode = "disabled"  # "disabled" | "local" | "cloud" | "hybrid"
provider = "disabled"  # "disabled" | "ollama" | "gemini" | "anthropic" | "openai-compat"
allow_cloud = false
require_user_confirmation_for_cloud = true

[policy.docs.vlm.ollama]
endpoint = "http://localhost:11434"
model = "gemma4:e4b"
timeout_secs = 120

[policy.docs.vlm.gemini]
api_key_env = "GOOGLE_API_KEY"
model = "gemini-3-flash-preview"
endpoint_base = "https://generativelanguage.googleapis.com/v1beta"
rpm_limit = 12

[policy.docs.vlm.anthropic]
model = "claude-sonnet-4-6"

[policy.docs.vlm.openai_compat]
endpoint = "http://localhost:1234/v1"
model = "google/gemma-3-12b-it"
api_key_env = "OPENAI_API_KEY"
timeout_secs = 120
# Thinking models can spend part of this budget on hidden reasoning before
# returning visible text, so keep the example comfortably above 1024.
max_tokens = 8192
temperature = 0.2


# ----------------------------------------------------------------------------
# [policy.docs.pdf] — Unified PDF extraction
# ----------------------------------------------------------------------------
# Extract embedded PDF images for OCR + optional VLM descriptions. Full-page
# rendering is only used for scanned/image-only fallback unless explicitly
# enabled below.
[policy.docs.pdf]
extract_embedded_images = true
min_image_dimension = 200
min_image_bytes = 4096
vlm_per_page_image = true
render_text_pdf_pages = false

# ----------------------------------------------------------------------------
# [policy.docs.retrieval] — Hybrid search weighting
# ----------------------------------------------------------------------------
# Used by `archon docs search --mode hybrid` to blend FTS rank and HNSW
# distance. Sum should be ~1.0; values are normalised.
[policy.docs.retrieval]
exact_weight = 0.45
semantic_weight = 0.55
