# Archon Game-Theory Routing Specification
# Declarative spec defining tiers, agents, conditions, and dependencies.
# Evaluated by the routing engine against the Tier 1 fingerprint.
version: "1.0"
spec_id: gametheory-routing-v1
cost_cap_usd: 5.0

tiers:
  - id: 1
    name: "Foundation"
    description: "Mandatory Tier 1 classification agents — always run"
    concurrency_cap: 4
    agents:
      - key: game-classifier
        mandatory: true
        depends_on: []
      - key: payoff-elicitor
        mandatory: true
        depends_on: []
      - key: strategy-space-enumerator
        mandatory: true
        depends_on: []
      - key: information-structure-mapper
        mandatory: true
        depends_on: []

  - id: 2
    name: "Equilibrium Analysis"
    description: "Conditional equilibrium-finding specialists"
    concurrency_cap: 3
    agents:
      - key: nash-equilibrium-finder
        condition: "fingerprint.cooperation == 'non-cooperative' && fingerprint.strategy_space == 'continuous'"
        mandatory: false
        depends_on: [payoff-elicitor]

      - key: dominant-strategy-identifier
        condition: "fingerprint.cooperation == 'non-cooperative' && fingerprint.cardinality == '2-player'"
        mandatory: false
        depends_on: [payoff-elicitor]

      - key: mixed-strategy-calculator
        condition: "fingerprint.strategy_space == 'discrete' && nash_count > 0"
        mandatory: false
        depends_on: [nash-equilibrium-finder]

      - key: bayesian-equilibrium-analyst
        condition: "fingerprint.complete_info == 'incomplete' || fingerprint.perfect_info == 'imperfect'"
        mandatory: false
        depends_on: [payoff-elicitor]

  - id: 3
    name: "Refinement and Recommendations"
    description: "Post-equilibrium refinement and strategic recommendations"
    concurrency_cap: 2
    agents:
      - key: trembling-hand-refiner
        condition: "enabled_count >= 3 && fingerprint.strategy_space == 'discrete'"
        mandatory: false
        depends_on: [nash-equilibrium-finder, mixed-strategy-calculator]

      - key: correlated-equilibrium-designer
        condition: "fingerprint.cooperation != 'non-cooperative'"
        mandatory: false
        depends_on: [bayesian-equilibrium-analyst]
