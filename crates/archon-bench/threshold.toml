# archon-bench regression thresholds.
#
# Single source of truth for "what counts as a regression" under the
# NFR-PERF gates. Bench bodies populated by phase-1..3 tasks MUST read
# these values at runtime and assert against them (criterion's
# configure_from_args is fine; a plain parse + panic! is also fine).
#
# Anchors: 02-technical-spec.md §1409-1412.

[task_submit]
# NFR-PERF-001: TaskService::submit p95 latency.
p95_ms = 100
reference = "02-technical-spec.md §374"

[discovery_scan]
# NFR-PERF-002: agent discovery scan over the 300-agent fixture
# generated by scripts/gen-discovery-fixture.sh (TASK-AGS-004).
p95_ms = 1000
reference = "02-technical-spec.md §546"

[fanout_100]
# NFR-SCALABILITY-001: 100 workers reach RUNNING.
p95_ms = 1000
reference = "02-technical-spec.md §862"
