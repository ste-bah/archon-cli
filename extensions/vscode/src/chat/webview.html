<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archon Chat</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      font-family: var(--vscode-font-family, sans-serif);
      font-size: var(--vscode-font-size, 13px);
      color: var(--vscode-foreground, #ccc);
      background: var(--vscode-editor-background, #1e1e1e);
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      padding: 8px 12px;
      border-radius: 6px;
      max-width: 90%;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: var(--vscode-button-background, #0e639c);
      color: var(--vscode-button-foreground, #fff);
    }

    .message.assistant {
      align-self: flex-start;
      background: var(--vscode-editor-selectionBackground, #264f78);
      color: var(--vscode-foreground, #ccc);
    }

    .message.system {
      align-self: center;
      font-style: italic;
      opacity: 0.7;
      font-size: 0.9em;
    }

    #streaming {
      padding: 8px 12px;
      min-height: 24px;
      white-space: pre-wrap;
      word-break: break-word;
      opacity: 0.85;
    }

    #input-area {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      border-top: 1px solid var(--vscode-panel-border, #3c3c3c);
      background: var(--vscode-sideBar-background, #252526);
    }

    form {
      display: flex;
      gap: 8px;
      width: 100%;
    }

    textarea {
      flex: 1;
      resize: none;
      background: var(--vscode-input-background, #3c3c3c);
      color: var(--vscode-input-foreground, #ccc);
      border: 1px solid var(--vscode-input-border, #555);
      border-radius: 4px;
      padding: 6px 8px;
      font-family: inherit;
      font-size: inherit;
      line-height: 1.4;
      min-height: 36px;
      max-height: 120px;
    }

    textarea:focus {
      outline: none;
      border-color: var(--vscode-focusBorder, #007fd4);
    }

    input[type="submit"] {
      background: var(--vscode-button-background, #0e639c);
      color: var(--vscode-button-foreground, #fff);
      border: none;
      border-radius: 4px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: inherit;
      align-self: flex-end;
    }

    input[type="submit"]:hover {
      background: var(--vscode-button-hoverBackground, #1177bb);
    }

    input[type="submit"]:disabled {
      opacity: 0.5;
      cursor: default;
    }
  </style>
</head>
<body>
  <div id="messages"></div>
  <div id="streaming"></div>
  <div id="input-area">
    <form id="chat-form">
      <textarea
        id="user-input"
        placeholder="Ask Archon anything… (Enter to send, Shift+Enter for newline)"
        rows="1"
      ></textarea>
      <input type="submit" id="send-btn" value="Send" />
    </form>
  </div>

  <script>
    // @ts-check
    /* global acquireVsCodeApi */
    const vscode = acquireVsCodeApi();

    const messagesDiv = document.getElementById('messages');
    const streamingDiv = document.getElementById('streaming');
    const form = document.getElementById('chat-form');
    const textarea = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    let streamBuffer = '';
    let isBusy = false;

    function appendMessage(role, content) {
      const div = document.createElement('div');
      div.className = 'message ' + role;
      div.textContent = content;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function setStreaming(text) {
      streamingDiv.textContent = text;
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function setBusy(busy) {
      isBusy = busy;
      textarea.disabled = busy;
      sendBtn.disabled = busy;
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = textarea.value.trim();
      if (!text || isBusy) return;

      appendMessage('user', text);
      textarea.value = '';
      setBusy(true);
      streamBuffer = '';

      vscode.postMessage({ type: 'prompt', text });
    });

    textarea.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        form.dispatchEvent(new Event('submit'));
      }
    });

    // Messages from the extension host
    window.addEventListener('message', (event) => {
      const msg = event.data;
      switch (msg.type) {
        case 'textDelta':
          streamBuffer += msg.text;
          setStreaming(streamBuffer);
          break;

        case 'turnComplete':
          if (streamBuffer.length > 0) {
            appendMessage('assistant', streamBuffer);
          }
          streamBuffer = '';
          setStreaming('');
          setBusy(false);
          break;

        case 'systemMessage':
          appendMessage('system', msg.text);
          break;

        case 'error':
          appendMessage('system', '\u26a0 ' + msg.message);
          setBusy(false);
          break;
      }
    });
  </script>
</body>
</html>
